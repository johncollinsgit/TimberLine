<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wishlist Drawer — Create List Toggle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f6f4;
      --ink: #1b1b1b;
      --muted: #9a9a9a;
      --pill: #f1f1f1;
      --pill-active: #1d1d1d;
      --accent: #111;
      --stroke: #e4e1dc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 32px;
      background: radial-gradient(circle at 20% 20%, #ffffff 0, #f2f0ed 40%, #e8e4de 100%);
      font-family: 'Work Sans', system-ui, -apple-system, sans-serif;
      color: var(--ink);
    }

    .drawer {
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg);
      border: 1px solid var(--stroke);
      border-radius: 18px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.08);
      padding: 26px 24px 32px;
    }

    .drawer__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .title {
      font-size: 15px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .close {
      background: none;
      border: none;
      font-size: 24px;
      color: var(--ink);
      cursor: pointer;
      line-height: 1;
      padding: 6px;
    }

    .create-toggle {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .link-button {
      background: none;
      border: none;
      color: var(--accent);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.04em;
      cursor: pointer;
      padding: 4px 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .link-button:focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: 3px;
    }

    .link-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--stroke);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: #fff;
    }

    .create-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 14px;
      border: 1px dashed var(--stroke);
      border-radius: 12px;
      background: #ffffff;
      margin-bottom: 18px;
    }

    .create-form input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d5d2cd;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
    }

    .create-form button {
      padding: 12px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
    }

    .section {
      margin-top: 12px;
      margin-bottom: 18px;
    }

    .section__head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }

    .section__title {
      font-size: 13px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    .section__meta {
      font-size: 13px;
      color: var(--muted);
    }

    .pill-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill {
      border-radius: 999px;
      border: 1px solid transparent;
      padding: 10px 14px;
      background: var(--pill);
      color: var(--ink);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .pill__count {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid #d3d0cb;
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
    }

    .pill.is-active {
      background: var(--pill-active);
      color: #fff;
      border-color: var(--pill-active);
    }

    .pill.is-active .pill__count {
      border-color: #000;
      background: #2b2b2b;
      color: #fff;
    }

    .empty {
      margin: 18px 0;
      padding: 18px 0 8px;
      border-top: 1px solid var(--stroke);
    }

    .empty__title {
      font-size: 13px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 6px;
    }

    .empty__body {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    @media (max-width: 520px) {
      body { padding: 16px; }
      .drawer { padding: 22px 18px 26px; }
      .title { letter-spacing: 0.22em; }
      .create-form { grid-template-columns: 1fr; }
      .create-form button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="drawer" role="dialog" aria-label="Wishlist drawer">
    <header class="drawer__header">
      <div class="title">Wishlist (3)</div>
      <button class="close" aria-label="Close wishlist">&times;</button>
    </header>

    <div class="create-toggle">
      <span class="link-icon" aria-hidden="true">＋</span>
      <button id="toggle-create" class="link-button" aria-expanded="false" aria-controls="create-form">
        Create a new list
      </button>
    </div>

    <form id="create-form" class="create-form" hidden>
      <input type="text" name="list_name" placeholder="Weekend restock ideas" aria-label="List name" />
      <button type="button">Add list</button>
    </form>

    <section class="section">
      <div class="section__head">
        <div class="section__title">Your lists</div>
        <div class="section__meta">2 saved lists</div>
      </div>
      <div class="pill-row">
        <button class="pill">
          Saved Items
          <span class="pill__count">3</span>
        </button>
        <button class="pill is-active">
          Christmas
          <span class="pill__count">0</span>
        </button>
      </div>
    </section>

    <section class="empty">
      <div class="empty__title">No saved products yet</div>
      <div class="empty__body">Tap the heart on any product page to save it here.</div>
    </section>
  </div>

  <script>
    const toggle = document.getElementById('toggle-create');
    const form = document.getElementById('create-form');
    const icon = document.querySelector('.link-icon');

    toggle.addEventListener('click', () => {
      const isHidden = form.hasAttribute('hidden');
      if (isHidden) {
        form.removeAttribute('hidden');
        toggle.setAttribute('aria-expanded', 'true');
        toggle.textContent = 'Hide create list';
        icon.textContent = '−';
      } else {
        form.setAttribute('hidden', '');
        toggle.setAttribute('aria-expanded', 'false');
        toggle.textContent = 'Create a new list';
        icon.textContent = '＋';
      }
    });
  </script>
</body>
</html>
