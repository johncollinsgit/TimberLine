<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenant Management | Forestry Backstage</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        :root {
            --bg: #f6f7fb;
            --panel: #ffffff;
            --panel-muted: #f1f3f7;
            --ink: #111827;
            --muted: #6b7280;
            --line: rgba(17, 24, 39, 0.08);
            --accent: #0f766e;
            --accent-soft: rgba(15, 118, 110, 0.10);
            --warn: #d97706;
            --success: #0ea5e9;
            --danger: #dc2626;
            --shadow: 0 18px 46px rgba(15, 23, 42, 0.08);
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", "Inter", system-ui, -apple-system, sans-serif;
            background: linear-gradient(180deg, #f9fafb 0%, #eef1f6 100%);
            color: var(--ink);
        }

        .page {
            max-width: 1440px;
            margin: 0 auto;
            padding: 32px 32px 64px;
        }

        header {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            align-items: center;
            margin-bottom: 18px;
        }

        .title-block h1 {
            margin: 0;
            font-size: 36px;
            letter-spacing: -0.02em;
        }

        .title-block p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 16px;
            max-width: 760px;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        button,
        .btn {
            border: 1px solid var(--line);
            background: var(--panel);
            color: var(--ink);
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
        }

        button:hover,
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow);
            border-color: rgba(15, 118, 110, 0.35);
        }

        .btn-primary {
            background: linear-gradient(135deg, #0f766e 0%, #0ea5e9 100%);
            color: #f9fafb;
            border: none;
        }

        .surface {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
        }

        .kpi-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }

        .kpi {
            padding: 16px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            display: grid;
            gap: 8px;
        }

        .kpi label {
            font-size: 12px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .kpi .value {
            font-size: 26px;
            font-weight: 600;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .kpi .delta {
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
        }

        .kpi .delta.negative {
            background: rgba(220, 38, 38, 0.12);
            color: var(--danger);
        }

        .kpi .window {
            font-size: 13px;
            color: var(--muted);
        }

        .split {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        @media (min-width: 1180px) {
            .split {
                grid-template-columns: 1fr;
            }
        }

        .card-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 18px 0;
            gap: 14px;
        }

        .card-head h2 {
            margin: 0;
            font-size: 20px;
        }

        .card-head p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding: 0 18px 12px;
        }

        .control {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control label {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.04em;
        }

        select, .input {
            border: 1px solid var(--line);
            background: var(--panel);
            padding: 9px 10px;
            border-radius: 10px;
            font-size: 14px;
            min-width: 160px;
        }

        .chart-card {
            padding-bottom: 12px;
        }

        #activity-chart {
            padding: 0 6px 0 6px;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding: 12px 18px 18px;
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
            background: var(--panel-muted);
        }

        .filter-bar .primary-filter {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 10px;
            background: #fff;
            border-radius: 10px;
            border: 1px solid var(--line);
        }

        .table-card {
            padding: 10px 0 0;
        }

        .table-toolbar {
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .table-toolbar .left {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search {
            min-width: 220px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        thead th {
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 2;
            text-align: left;
            padding: 12px 14px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            border-bottom: 1px solid var(--line);
            cursor: pointer;
        }

        tbody tr {
            border-bottom: 1px solid var(--line);
            background: #fff;
            transition: background 100ms ease, box-shadow 100ms ease;
        }

        tbody tr:hover {
            background: #f8fafc;
        }

        tbody td {
            padding: 12px 14px;
            font-size: 14px;
            border-bottom: 1px solid var(--line);
        }

        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            background: var(--accent-soft);
            color: var(--accent);
        }

        .status-chip.off {
            background: rgba(220, 38, 38, 0.12);
            color: var(--danger);
        }

        .drawer {
            position: fixed;
            top: 0;
            right: -480px;
            width: 420px;
            height: 100vh;
            background: #fff;
            box-shadow: -18px 0 40px rgba(15, 23, 42, 0.12);
            border-left: 1px solid var(--line);
            transition: right 220ms ease;
