name: PHP Compatibility

on:
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos
    paths:
      - composer.json
      - composer.lock
      - phpunit.xml
      - .github/workflows/php-compatibility.yml
  schedule:
    - cron: '17 7 * * *'
  workflow_dispatch:

concurrency:
  group: php-compatibility-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compatibility:
    name: ci (8.5)
    runs-on: ubuntu-latest
    environment: Testing

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Locate Composer cache
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-8.5-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-composer-

      - name: Configure Flux Composer auth
        env:
          FLUX_USERNAME: ${{ secrets.FLUX_USERNAME }}
          FLUX_LICENSE_KEY: ${{ secrets.FLUX_LICENSE_KEY }}
        run: composer config http-basic.composer.fluxui.dev "$FLUX_USERNAME" "$FLUX_LICENSE_KEY"

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare application key
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Build frontend assets
        run: npm run build

      - name: Run tests in parallel
        run: php -d memory_limit=1G ./vendor/bin/pest --parallel --compact
