name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_tests:
        description: Run test/build gate before deploy (uncheck only for an emergency hotfix)
        required: false
        default: true
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      run_tests: ${{ steps.gate.outputs.run_tests }}
    steps:
      - name: Decide whether to run the test/build gate
        id: gate
        # Always run the gate on push to main. Only a manual dispatch that
        # explicitly unchecks run_tests may bypass it (emergency hotfix).
        run: echo "run_tests=${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_tests == 'true' }}" >> "$GITHUB_OUTPUT"

  test_and_build:
    name: Test And Build Gate
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.run_tests == 'true'
    environment: Testing
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Verify test prerequisites (fail loudly)
        run: |
          set -euo pipefail

          if [ ! -f phpunit.xml ] || [ ! -d tests ]; then
            echo "::error::Deploy gate cannot run: missing phpunit.xml or tests/ directory."
            exit 1
          fi

          if grep -q '"livewire/flux"' composer.json && { [ -z "${{ secrets.FLUX_USERNAME }}" ] || [ -z "${{ secrets.FLUX_LICENSE_KEY }}" ]; }; then
            echo "::error::Deploy gate cannot run: FLUX_USERNAME and FLUX_LICENSE_KEY secrets are required to install dependencies. Set them on the Testing environment."
            exit 1
          fi

      - name: Configure Flux composer auth
        env:
          FLUX_USERNAME: ${{ secrets.FLUX_USERNAME }}
          FLUX_LICENSE_KEY: ${{ secrets.FLUX_LICENSE_KEY }}
        run: composer config http-basic.composer.fluxui.dev "$FLUX_USERNAME" "$FLUX_LICENSE_KEY"

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare app key for CI
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Build frontend assets
        run: npm run build

      - name: Run tests
        run: php -d memory_limit=1G ./vendor/bin/pest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - setup
      - test_and_build
    # Deploy only when the gate passed. A 'skipped' gate is allowed ONLY for the
    # manual emergency-hotfix path (workflow_dispatch with run_tests unchecked);
    # on a normal push the gate runs, so a test failure here blocks the deploy.
    if: >
      always() &&
      needs.setup.result == 'success' &&
      (needs.test_and_build.result == 'success' ||
        (needs.test_and_build.result == 'skipped' && github.event_name == 'workflow_dispatch'))
    environment:
      name: production
    steps:
      - name: Validate deployment secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          for var in DEPLOY_HOST DEPLOY_USER DEPLOY_PORT DEPLOY_PATH DEPLOY_SSH_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              exit 1
            fi
          done

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_REF: ${{ github.sha }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "set -euo pipefail; cd '$DEPLOY_PATH'; git fetch origin main; git reset --hard; git clean -fd; git checkout -B main '$DEPLOY_REF'; APP_DIR='$DEPLOY_PATH' DEPLOY_REF='$DEPLOY_REF' bash '$DEPLOY_PATH/scripts/deploy_backstage.sh'"
