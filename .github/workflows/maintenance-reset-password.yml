name: Maintenance Reset Password

on:
  workflow_dispatch:
    inputs:
      email:
        description: User email to reset
        required: true
        type: string
      role:
        description: Role to enforce (admin|manager|marketing_manager|pouring)
        required: false
        default: admin
        type: choice
        options:
          - admin
          - manager
          - marketing_manager
          - pouring

permissions:
  contents: read

jobs:
  reset_password:
    name: Reset Password
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Validate required secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          RESET_PASSWORD_OVERRIDE: ${{ secrets.RESET_PASSWORD_OVERRIDE }}
        run: |
          set -euo pipefail
          for var in DEPLOY_HOST DEPLOY_USER DEPLOY_PORT DEPLOY_PATH DEPLOY_SSH_KEY RESET_PASSWORD_OVERRIDE; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              exit 1
            fi
          done

      - name: Validate workflow inputs
        env:
          TARGET_EMAIL: ${{ github.event.inputs.email }}
          TARGET_ROLE: ${{ github.event.inputs.role }}
        run: |
          set -euo pipefail

          if ! printf '%s' "$TARGET_EMAIL" | grep -Eiq '^[A-Z0-9._%+\-]+@[A-Z0-9.\-]+\.[A-Z]{2,}$'; then
            echo "::error::Invalid email input."
            exit 1
          fi

          if ! printf '%s' "$TARGET_ROLE" | grep -Eq '^(admin|manager|marketing_manager|pouring)$'; then
            echo "::error::Invalid role input."
            exit 1
          fi

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Reset user password on production
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          RESET_PASSWORD_OVERRIDE: ${{ secrets.RESET_PASSWORD_OVERRIDE }}
          TARGET_EMAIL: ${{ github.event.inputs.email }}
          TARGET_ROLE: ${{ github.event.inputs.role }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -euo pipefail; cd '$DEPLOY_PATH'; php artisan users:ensure-approved '$TARGET_EMAIL' '$RESET_PASSWORD_OVERRIDE' --role='$TARGET_ROLE'"

