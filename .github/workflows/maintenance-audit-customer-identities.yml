name: Audit Everbranch Customer Identities

on:
  workflow_dispatch:
    inputs:
      target:
        description: Customer identity audit target
        required: true
        default: all-customers
        type: choice
        options:
          - all-customers
          - faith-crocker

permissions:
  contents: read

jobs:
  audit:
    name: Read-only customer identity audit
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Validate required secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          for var in DEPLOY_HOST DEPLOY_USER DEPLOY_PORT DEPLOY_PATH DEPLOY_SSH_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              exit 1
            fi
          done

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Audit Modern Forestry customer identities on production
        id: audit
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          AUDIT_TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          case "$AUDIT_TARGET" in
            all-customers)
              audit_query=""
              ;;
            faith-crocker)
              audit_query=" --query='Faith Crocker'"
              ;;
            *)
              echo "::error::Unsupported audit target: $AUDIT_TARGET"
              exit 1
              ;;
          esac
          audit_file="$RUNNER_TEMP/customer-identity-audit.json"
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -euo pipefail; cd '$DEPLOY_PATH'; php artisan marketing:audit-customer-identities --tenant=modern-forestry --store=retail --json$audit_query" \
            > "$audit_file"
          jq -e . "$audit_file" > /dev/null
          jq '{tenant_id, tenant_slug, store_key, clusters, deterministic_clusters, needs_review_clusters, shopify_merge_clusters, birthday_data_clusters}' "$audit_file"

      - name: Retain detailed audit briefly for reviewed reconciliation
        uses: actions/upload-artifact@v4
        with:
          name: customer-identity-audit-${{ inputs.target }}-${{ github.run_id }}
          path: ${{ runner.temp }}/customer-identity-audit.json
          if-no-files-found: error
          retention-days: 1
